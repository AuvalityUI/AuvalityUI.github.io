<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auvality — Game UI/UX Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="./assets/data.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050505;
      --surface:   #111111;
      --surface2:  #1a1a1a;
      --text:      #FFFFFF;
      --muted:     #a0a09e;
      --border:    rgba(255,255,255,0.13);
      --border-h:  rgba(255,255,255,0.26);
      --accent:    #ffffff;
      --accent-dim: rgba(255,255,255,0.75);
      --r-card:    22px;
      --ff-head:   'Inter', sans-serif;
      --ff-body:   'Inter', sans-serif;
      --ff-serif:  'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    @keyframes pageFadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    .container { animation: pageFadeIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 10px; }
    * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.18) var(--bg); }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      cursor: auto;
    }

    a { text-decoration: none; color: inherit; cursor: pointer; }
    ul { list-style: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }





    /* ── LAYOUT ─────────────────────────────────────────────── */
    .container { max-width: 1020px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 3; }

    /* ── SCROLL REVEAL ──────────────────────────────────────── */
    .reveal {
      opacity: 0; transform: translateY(28px) scale(0.97);
      transition: opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.175,.885,.32,1.275);
    }
    .reveal.in { opacity: 1; transform: none; }

    /* ── HEADER ─────────────────────────────────────────────── */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px 0; flex-wrap: wrap; gap: 16px;
      border-bottom: 1px solid var(--border);
      animation: fadeDown .9s cubic-bezier(.16,1,.3,1) both;
      position: relative;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: none; }
    }

    .profile-section { display: flex; align-items: center; gap: 14px; }
    .profile-img {
      width: 38px; height: 38px; border-radius: 50%;
      background: #2A2A2A center/cover; flex-shrink: 0;
      overflow: hidden; position: relative;
      box-shadow: 0 0 0 1.5px rgba(255,255,255,0.18), 0 0 14px rgba(255,255,255,0.06);
    }
    .profile-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .profile-info h1 { font-family: var(--ff-head); font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
    .profile-info p { font-size: 11.5px; color: var(--muted); font-weight: 300; }

    .hdivider { width: 1px; height: 22px; background: var(--border); }

    .status-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 11.5px; padding: 5px 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 20px;
      backdrop-filter: blur(6px);
    }
    .status-dot {
      width: 6px; height: 6px; background: #3fde84; border-radius: 50%;
      animation: pulse 2.5s ease infinite;
      box-shadow: 0 0 10px rgba(63,222,132,0.9), 0 0 20px rgba(63,222,132,0.4);
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 10px rgba(63,222,132,0.9), 0 0 20px rgba(63,222,132,0.4), 0 0 0 0 rgba(63,222,132,0.4); }
      60%      { box-shadow: 0 0 10px rgba(63,222,132,0.9), 0 0 20px rgba(63,222,132,0.4), 0 0 0 7px rgba(63,222,132,0); }
    }

    /* ── SOCIAL BUTTONS ────────────────────────────────────── */
    .social-links { display: flex; gap: 5px; }
    .social-btn {
      height: 34px; padding: 0 14px;
      background: var(--surface); border-radius: 20px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: var(--ff-head); font-weight: 700; font-size: 10px; letter-spacing: 0.06em;
      border: 1px solid var(--border); color: var(--muted);
      position: relative; overflow: hidden;
      transition: color .3s cubic-bezier(.175,.885,.32,1.275),
                  border-color .3s ease, transform .3s cubic-bezier(.175,.885,.32,1.275),
                  box-shadow .3s ease;
    }
    .social-btn::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: rgba(255,255,255,0.05); opacity: 0; transition: opacity .3s ease;
    }
    .social-btn::after {
      content: ''; position: absolute; top: 0; left: -120%;
      width: 60%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
      transform: skewX(-20deg);
    }
    .social-btn:hover::after { animation: btnGlint .5s ease-out forwards; }
    @keyframes btnGlint { 0% { left:-120%; } 100% { left:180%; } }
    .social-btn:hover {
      transform: translateY(-3px); color: var(--text);
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    }
    .social-btn:hover::before { opacity: 1; }
    .social-btn svg, .social-btn span { position: relative; z-index: 1; }
    .social-btn svg { width: 13px; height: 13px; flex-shrink: 0; transition: transform .3s ease; fill: currentColor; }
    .social-btn:hover svg { transform: scale(1.15); }

    /* ── HERO ───────────────────────────────────────────────── */
    .hero {
      padding: 80px 0 96px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; position: relative;
    }
    .hero > * { position: relative; z-index: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: none; }
    }

    @keyframes heroFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    /* Ambient hero background glow */
    .hero::before {
      content: '';
      position: absolute;
      top: 10%; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.02) 40%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: ambientPulse 5s ease-in-out infinite;
    }
    @keyframes ambientPulse {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scale(1.08); }
    }

        .hero-title {
      font-family: var(--ff-serif);
      font-size: clamp(60px, 10vw, 90px);
      font-weight: 700; letter-spacing: -0.03em; line-height: 0.95;
      margin-bottom: 28px;
      color: var(--text);
      animation: fadeUp 1s .2s cubic-bezier(.16,1,.3,1) both;
      display: none;
    }

    .hero-subtitle {
      font-size: 15px; font-weight: 400; color: var(--muted); max-width: 400px;
      margin-bottom: 8px;
      animation: fadeUp .9s .35s cubic-bezier(.16,1,.3,1) both;
      letter-spacing: 0.02em;
    }
    .hero-desc {
      font-size: 13px; color: var(--muted); font-weight: 300;
      max-width: 360px; margin-bottom: 40px; line-height: 1.75;
      animation: fadeUp .9s .45s cubic-bezier(.16,1,.3,1) both;
    }

    /* ── CTA BUTTON ─────────────────────────────────────────── */
    .cta-button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--text);
      padding: 14px 38px; border-radius: 40px;
      font-family: var(--ff-head); font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: all .4s cubic-bezier(.175,.885,.32,1.275);
      box-shadow: 0 0 0 0 rgba(255,255,255,0), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: fadeUp .9s .55s cubic-bezier(.16,1,.3,1) both;
      position: relative; overflow: hidden; display: inline-block;
      backdrop-filter: blur(8px);
    }
    .cta-button::after {
      content: ''; position: absolute; top: 0; left: -130%;
      width: 60%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
      transform: skewX(-20deg);
    }
    .cta-button:hover::after { animation: ctaGlint .6s ease-out forwards; }
    @keyframes ctaGlint { 0% { left:-130%; } 100% { left:180%; } }
    .cta-button:hover {
      transform: translateY(-5px) scale(1.03);
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 30px rgba(255,255,255,0.1), 0 0 0 1px rgba(255,255,255,0.2),
                  0 16px 40px rgba(0,0,0,0.4);
    }

    /* ── DIVIDER ────────────────────────────────────────────── */
    .section-divider {
      width: 100%; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), rgba(255,255,255,0.06), rgba(255,255,255,0.08), transparent);
    }

    /* ── SECTIONS ───────────────────────────────────────────── */
    .section { padding: 72px 0; }
    .section-header { text-align: center; margin-bottom: 48px; }

    .section-pill { display: none; }
    .section-title {
      font-family: var(--ff-head); font-size: clamp(26px, 4vw, 38px);
      font-weight: 700; letter-spacing: -0.03em; line-height: 1.08; margin-bottom: 12px;
    }
    .section-desc { font-size: 13.5px; color: var(--muted); font-weight: 300; line-height: 1.75; }

    /* ── GRID ───────────────────────────────────────────────── */
    .grid-container {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; max-width: 860px; margin: 0 auto;
    }
    @media (max-width: 720px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .grid-container { grid-template-columns: 1fr; } }

    /* ── CARD ───────────────────────────────────────────────── */
    .card {
      background: var(--surface); border-radius: var(--r-card);
      padding: 36px 18px 24px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      transition: transform .45s cubic-bezier(.175,.885,.32,1.275),
                  box-shadow .45s ease, border-color .3s ease;
      cursor: pointer; position: relative; overflow: hidden;
      opacity: 0; transform: translateY(36px) scale(0.88);
    }
    .card::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit; z-index: 0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      transition: box-shadow .4s ease; pointer-events: none;
    }
    .border-glow {
      position: absolute; inset: 0; border-radius: inherit; padding: 1.5px;
      background: radial-gradient(
        160px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(255,255,255,0.85)  0%, rgba(255,255,255,0.35) 35%,
        rgba(255,255,255,0.06) 60%, transparent 75%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      opacity: 0;
      animation: borderGlowIdle 2.8s ease-in-out infinite alternate;
      pointer-events: none; z-index: 20;
    }
    @keyframes borderGlowIdle {
      0%   { opacity: 0.06; }
      100% { opacity: 0.28; }
    }
    .card:hover .border-glow { opacity: 1 !important; animation: none; }

    .card-border-glow {
      position: absolute; inset: 0; border-radius: inherit; padding: 1.5px;
      background: radial-gradient(
        160px circle at var(--mx, 50%) var(--my, 50%),
        rgba(255,255,255,0.7)  0%, rgba(255,255,255,0.25) 35%,
        rgba(255,255,255,0.04) 60%, transparent 75%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      animation: borderGlowIdle 3.2s ease-in-out infinite alternate;
      pointer-events: none; z-index: 20;
    }
    .pricing-card:hover .card-border-glow,
    .about-bio:hover .card-border-glow,
    .stat-box:hover .card-border-glow,
    .process-step:hover .card-border-glow,
    .booking-card:hover .card-border-glow,
    .tcard:hover .card-border-glow {
      opacity: 1 !important; animation: none;
    }

    .card-shimmer {
      position: absolute; inset: 0; border-radius: inherit; overflow: hidden; pointer-events: none; z-index: 1;
    }
    .card-shimmer::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(115deg, rgba(255,255,255,0) 35%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0) 65%);
      transform: translateX(-120%) skewX(-10deg);
    }
    .card:hover .card-shimmer::before { animation: sweep .6s ease-out; }
    @keyframes sweep {
      from { transform: translateX(-120%) skewX(-10deg); }
      to   { transform: translateX(220%)  skewX(-10deg); }
    }
    .card::after {
      content: ''; position: absolute; bottom: -40px; left: 50%;
      transform: translateX(-50%);
      width: 70%; height: 80px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.07) 0%, transparent 70%);
      border-radius: 50%; opacity: 0;
      transition: opacity .4s ease, bottom .4s ease;
      pointer-events: none; z-index: 0;
    }
    .card.in {
      opacity: 1; transform: none;
      transition: opacity .65s cubic-bezier(.16,1,.3,1), transform .75s cubic-bezier(.175,.885,.32,1.275),
                  box-shadow .45s ease, border-color .3s ease;
    }
    .card.in.lifted {
      transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .45s cubic-bezier(.175,.885,.32,1.275),
                  box-shadow .45s ease, border-color .3s ease;
    }
    .card:hover {
      transform: translateY(-14px) scale(1.02);
      border-color: rgba(255,255,255,0.32);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.24), 0 0 30px rgba(255,255,255,0.14),
        0 0 80px rgba(255,255,255,0.06), 0 32px 64px rgba(0,0,0,0.6),
        0 8px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .card:hover::before { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18); }
    .card:hover::after  { opacity: 1; bottom: -20px; }

    .card-click-hint {
      position: absolute; top: 12px; right: 12px;
      font-size: 9px; font-weight: 600; font-family: var(--ff-head);
      letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4);
      opacity: 0; transition: opacity .3s; z-index: 5;
    }
    .card:hover .card-click-hint { opacity: 1; }

    .card-title {
      font-family: var(--ff-head); font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-top: 20px; color: rgba(255,255,255,0.6);
      transition: color .3s, letter-spacing .3s;
      position: relative; z-index: 5;
    }
    .card:hover .card-title { color: var(--text); letter-spacing: 0.09em; }
    .card-desc {
      font-size: 10.5px; color: var(--muted); font-weight: 300; text-align: center;
      margin-top: 6px; line-height: 1.6; max-width: 130px;
      position: relative; z-index: 5;
      transition: color .3s;
    }
    .card:hover .card-desc { color: rgba(255,255,255,0.5); }

    /* ── FOLDER ─────────────────────────────────────────────── */
    .folder { position: relative; width: 132px; height: 92px; perspective: 900px; z-index: 5; }
    .folder::before {
      content: ''; position: absolute; top: -12px; left: 0;
      width: 46px; height: 14px;
      background: #ffffff;
      border-radius: 7px 7px 0 0;
      border: 1px solid rgba(255,255,255,0.6);
      border-bottom: none;
      box-shadow: 0 -2px 8px rgba(255,255,255,0.15);
    }
    .folder-back {
      position: absolute; inset: 0;
      background: #f0f0f0;
      border-radius: 0 8px 8px 8px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .folder-inside {
      position: absolute; bottom: 8px; left: 8px;
      width: calc(100% - 16px); height: 70%;
      background: #e8e8e8;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.5);
    }
    .folder-inside::after { display: none; }
    .folder-front {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 72%;
      background: #ffffff;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.9);
      border-top: 1px solid rgba(255,255,255,1);
      z-index: 10; overflow: hidden;
      transform-origin: bottom center;
      transition: transform .45s cubic-bezier(.175,.885,.32,1.275);
      box-shadow: 0 4px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .folder-front::before { display: none; }
    .card:hover .folder-front { transform: rotateX(-26deg); }
    .folder-front::after {
      content: ''; position: absolute; top: 0; left: -160%;
      width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
    }
    .card:hover .folder-front::after { animation: glint .55s ease-out forwards; }
    @keyframes glint { 0% { left:-160%; } 100% { left:210%; } }

    /* ── POP IMAGES ─────────────────────────────────────────── */
    .popout-images {
      position: absolute; bottom: 22px; left: 50%;
      transform: translateX(-50%); width: 100%; height: 100%;
      z-index: 5; pointer-events: none; /* enabled per-item on hover via CSS */
    }
    .pop-img {
      position: absolute; width: 58px; height: 40px;
      border-radius: 5px; border: 1.5px solid rgba(255,255,255,0.12);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      background-size: cover; background-position: center;
      opacity: 0; transition: all .45s cubic-bezier(.175,.885,.32,1.275);
      cursor: default;
    }
    .pop-img:nth-child(1) { left: 6px;  bottom: -8px; transform: rotate(0) scale(0.82); transition-delay: .07s; }
    .pop-img:nth-child(2) { right: 6px; bottom: -8px; transform: rotate(0) scale(0.82); transition-delay: .035s; }
    .pop-img:nth-child(3) { left: 50%;  bottom: -8px; transform: translateX(-50%) scale(0.82); width: 68px; height: 46px; z-index: 2; transition-delay: 0s; }
    .card:hover .pop-img { opacity: 1; }
    .card:hover .pop-img:nth-child(1) { bottom: 10px; transform: rotate(-14deg) scale(1) translateX(-4px); transition-delay: 0s; }
    .card:hover .pop-img:nth-child(2) { bottom: 10px; transform: rotate(14deg)  scale(1) translateX( 4px); transition-delay: .035s; }
    .card:hover .pop-img:nth-child(3) { bottom: 20px; transform: translateX(-50%) scale(1); transition-delay: .07s; }

    /* enable pointer events and show zoom cursor on visible pop images */
    .card:hover .pop-img {
      pointer-events: all;
      cursor: zoom-in;
    }

    /* ── LIGHTBOX ───────────────────────────────────────────── */
    .lightbox {
      position: fixed; inset: 0; z-index: 20000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(28px);
      opacity: 0; pointer-events: none; transition: opacity .4s cubic-bezier(.16,1,.3,1);
    }
    .lightbox.open { opacity: 1; pointer-events: all; }
    .lightbox-inner {
      background: #101010;
      border-radius: 28px;
      max-width: 820px; width: 94%;
      border: 1px solid rgba(255,255,255,0.14);
      transform: scale(0.88) translateY(32px);
      transition: transform .5s cubic-bezier(.16,1,.3,1);
      position: relative; overflow: hidden;
      box-shadow: 0 80px 160px rgba(0,0,0,0.9),
                  0 0 0 1px rgba(255,255,255,0.1),
                  0 0 60px rgba(255,255,255,0.03);
    }
    .lightbox.open .lightbox-inner { transform: scale(1) translateY(0); }
    .lightbox-inner::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.35), transparent);
      z-index: 10;
    }
    .lightbox-title-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 28px 0;
    }
    .lightbox-label {
      font-family: var(--ff-head); font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      padding: 5px 14px; border-radius: 20px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13);
    }
    .lightbox-close {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; line-height: 1; color: rgba(255,255,255,0.5);
      cursor: pointer; transition: all .25s cubic-bezier(.175,.885,.32,1.275);
    }
    .lightbox-close:hover {
      background: rgba(255,255,255,0.16); color: #fff;
      border-color: rgba(255,255,255,0.3); transform: scale(1.1) rotate(90deg);
    }

    /* single image display */
    #lightboxImgWrap { padding: 20px 28px 22px; }
    .lightbox-img-main {
      width: 100%;
      height: clamp(260px, 50vh, 480px);
      border-radius: 18px;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      transition: opacity 0.22s ease;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    .lightbox-img-main.fading { opacity: 0; }

    /* navigation row */
    .lightbox-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 0 0; gap: 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 20px;
    }
    .lb-nav-side {
      display: flex; align-items: center;
    }
    .lb-nav-divider {
      width: 1px; height: 56px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .lb-nav-btn {
      width: 56px; height: 56px; border-radius: 0;
      background: transparent;
      border: none;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.4); cursor: pointer;
      transition: all .22s ease;
      flex-shrink: 0;
    }
    .lb-nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.05);
      color: #fff;
    }
    .lb-nav-btn:disabled { opacity: 0.18; cursor: default; }
    .lb-nav-center {
      flex: 1; display: flex; align-items: center; justify-content: center; height: 56px;
    }
    .lb-counter {
      font-family: var(--ff-head); font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; color: rgba(255,255,255,0.35);
      min-width: 44px; text-align: center;
    }
    /* dot indicators */
    .lb-dots {
      display: flex; gap: 7px; align-items: center;
    }
    .lb-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      transition: all .25s cubic-bezier(.175,.885,.32,1.275); cursor: pointer;
    }
    .lb-dot.active {
      width: 20px; border-radius: 3px;
      background: rgba(255,255,255,0.85);
    }
    .lb-dot:hover:not(.active) { background: rgba(255,255,255,0.45); transform: scale(1.3); }

    /* ── PROJECTS PLACEHOLDER ───────────────────────────────── */
    .projects-placeholder {
      border: 1.5px dashed rgba(255,255,255,0.07); border-radius: var(--r-card);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 64px 32px;
      background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      position: relative; overflow: hidden;
    }
    .projects-placeholder::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .coming-soon-icon {
      width: 44px; height: 44px; background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 12px rgba(255,255,255,0.04);
    }
    .coming-soon-icon svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.4); }
    .coming-soon-label {
      font-family: var(--ff-head); font-size: 13px; font-weight: 700;
      letter-spacing: -0.01em; position: relative; z-index: 1; color: var(--muted);
    }

    /* ── FOOTER ─────────────────────────────────────────────── */
    .footer { border-top: 1px solid var(--border); padding: 36px 0 40px; position: relative; }
    .footer::before {
      content: ''; position: absolute; top: -1px; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
    }
    .footer-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-wrap: wrap; gap: 24px; margin-bottom: 32px;
      padding-bottom: 28px; border-bottom: 1px solid var(--border);
    }
    .footer-name { font-family: var(--ff-head); font-size: 15px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .footer-tagline { font-size: 12px; color: var(--muted); font-weight: 300; }
    .footer-cols { display: flex; gap: 52px; flex-wrap: wrap; }
    .footer-col-title {
      font-family: var(--ff-head); font-size: 9.5px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 12px;
    }
    .footer-col ul { display: flex; flex-direction: column; gap: 8px; }
    .footer-col ul li a {
      font-size: 12.5px; color: var(--muted); font-weight: 300;
      transition: color .2s, padding-left .2s; display: inline-block;
    }
    .footer-col ul li a:hover { color: var(--text); padding-left: 4px; }
    .footer-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .footer-copy { font-size: 11.5px; color: var(--muted); font-weight: 300; }
    .footer-socials { display: flex; gap: 5px; }

    @media (max-width: 600px) {
      .container { padding: 0 20px; }
      .footer-cols { gap: 32px; }
    }

    /* ── ABOUT SECTION ──────────────────────────────────────── */
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 32px; max-width: 860px; margin: 0 auto; align-items: start;
    }
    @media (max-width: 640px) { .about-grid { grid-template-columns: 1fr; } }
    .about-bio {
      background: var(--surface); border-radius: var(--r-card);
      border: 1px solid var(--border); padding: 36px;
      position: relative; overflow: hidden;
    }
    .about-bio::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
    }
    .about-bio-label {
      font-family: var(--ff-head); font-size: 9px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); margin-bottom: 18px;
    }
    .about-bio-text { font-size: 13.5px; color: var(--muted); line-height: 1.85; font-weight: 300; }
    .about-bio-text strong { color: var(--text); font-weight: 500; }

    .about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-box {
      background: var(--surface); border-radius: 16px;
      border: 1px solid var(--border); padding: 24px 20px;
      text-align: center; position: relative; overflow: hidden;
      transition: border-color .3s ease, transform .3s ease;
    }
    .stat-box:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-4px); }
    .stat-box::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%);
    }
    .stat-num { font-family: var(--ff-head); font-size: 32px; font-weight: 800; letter-spacing: -0.04em; color: var(--text); position: relative; z-index: 1; }
    .stat-label { font-size: 10px; color: var(--muted); font-weight: 300; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; position: relative; z-index: 1; }

    /* ── PROCESS STEPS ──────────────────────────────────────── */
    .process-steps {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; max-width: 860px; margin: 48px auto 0;
    }
    @media (max-width: 700px) { .process-steps { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 420px) { .process-steps { grid-template-columns: 1fr; } }
    .process-step {
      background: var(--surface); border-radius: 18px;
      border: 1px solid var(--border); padding: 28px 20px;
      position: relative; overflow: hidden;
      transition: border-color .3s ease, transform .3s ease;
    }
    .process-step:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-5px); }
    .process-num { font-family: var(--ff-head); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: rgba(255,255,255,0.2); margin-bottom: 18px; }
    .process-icon {
      width: 36px; height: 36px; background: var(--surface2);
      border-radius: 10px; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; margin-bottom: 16px;
    }
    .process-icon svg { width: 16px; height: 16px; fill: rgba(255,255,255,0.5); }
    .process-title { font-family: var(--ff-head); font-size: 11.5px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 8px; }
    .process-desc { font-size: 11px; color: var(--muted); font-weight: 300; line-height: 1.7; }

    /* ── TESTIMONIALS ───────────────────────────────────────── */
    .testimonials-track-wrap { overflow: hidden; position: relative; margin: 0 -32px; }
    .testimonials-track-wrap::before,
    .testimonials-track-wrap::after {
      content: ''; position: absolute; top: 0; bottom: 0; width: 80px; z-index: 2; pointer-events: none;
    }
    .testimonials-track-wrap::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
    .testimonials-track-wrap::after  { right: 0; background: linear-gradient(to left, var(--bg), transparent); }
    .testimonials-track {
      display: flex; gap: 16px; width: max-content;
      animation: marquee 38s linear infinite; padding: 0 32px;
    }
    .testimonials-track:hover { animation-play-state: paused; }
    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .tcard {
      background: var(--surface); border-radius: 20px;
      border: 1px solid var(--border); padding: 28px 28px 24px;
      width: 300px; flex-shrink: 0; position: relative; overflow: hidden;
    }
    .tcard::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
    }
    .tcard-quote { font-size: 28px; line-height: 1; margin-bottom: 14px; color: rgba(255,255,255,0.15); font-family: var(--ff-serif); }
    .tcard-body { font-size: 12.5px; color: var(--muted); line-height: 1.75; font-weight: 300; margin-bottom: 20px; }
    .tcard-author { display: flex; align-items: center; gap: 10px; }
    .tcard-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--ff-head); font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.4); flex-shrink: 0;
    }
    .tcard-name { font-family: var(--ff-head); font-size: 10.5px; font-weight: 700; letter-spacing: -0.01em; }
    .tcard-role { font-size: 10px; color: var(--muted); font-weight: 300; margin-top: 1px; }
    .tcard-stars { display: flex; gap: 3px; margin-bottom: 12px; }
    .tcard-stars span { font-size: 10px; color: rgba(255,255,255,0.5); }

    /* ── PRICING ────────────────────────────────────────────── */
    .pricing-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; max-width: 860px; margin: 0 auto;
    }
    @media (max-width: 660px) { .pricing-grid { grid-template-columns: 1fr; max-width: 400px; } }
    .pricing-card {
      background: var(--surface); border-radius: var(--r-card);
      border: 1px solid var(--border); padding: 36px 28px;
      position: relative; overflow: hidden;
      transition: border-color .3s ease, transform .35s cubic-bezier(.175,.885,.32,1.275);
      display: flex; flex-direction: column;
    }
    .pricing-card:hover { border-color: rgba(255,255,255,0.22); transform: translateY(-8px); }
    .pricing-card.featured {
      border-color: rgba(255,255,255,0.22);
      background: linear-gradient(165deg, rgba(255,255,255,0.06) 0%, var(--surface) 60%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 30px 60px rgba(0,0,0,0.4);
    }
    .pricing-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
    }
    .pricing-badge {
      display: inline-block; font-family: var(--ff-head); font-size: 8px;
      font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px; margin-bottom: 24px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
    }
    .pricing-badge.pop { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.3); color: var(--text); }
    .pricing-name { font-family: var(--ff-head); font-size: 15px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
    .pricing-desc { font-size: 11.5px; color: var(--muted); font-weight: 300; margin-bottom: 28px; }
    .pricing-price { font-family: var(--ff-head); font-size: 38px; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 6px; }
    .pricing-price sup { font-size: 16px; font-weight: 600; vertical-align: super; margin-right: 2px; }
    .pricing-price-note { font-size: 10.5px; color: var(--muted); font-weight: 300; margin-bottom: 28px; }
    .pricing-divider { height: 1px; background: var(--border); margin-bottom: 24px; }
    .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 11px; flex: 1; }
    .pricing-features li { display: flex; align-items: flex-start; gap: 10px; font-size: 12px; color: var(--muted); font-weight: 300; }
    .pricing-features li::before {
      content: ''; width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14);
      flex-shrink: 0; margin-top: 1px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 10' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 5l2 2 4-4' stroke='rgba(255,255,255,0.5)' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-size: 70%; background-position: center; background-repeat: no-repeat;
    }
    .pricing-cta {
      margin-top: 28px; width: 100%; padding: 14px; border-radius: 12px;
      font-family: var(--ff-head); font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
      color: var(--text); cursor: pointer;
      transition: all .3s cubic-bezier(.175,.885,.32,1.275);
    }
    .pricing-cta:hover {
      background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .pricing-cta.primary { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
    .pricing-cta.primary:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.45); }

    /* ── BOOKING ────────────────────────────────────────────── */
    .booking-wrap { max-width: 720px; margin: 0 auto; }
    .booking-card {
      background: var(--surface); border-radius: var(--r-card);
      border: 1px solid var(--border); padding: 48px 44px;
      position: relative; overflow: hidden;
    }
    @media (max-width: 600px) { .booking-card { padding: 32px 24px; } }
    .booking-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
    }
    .booking-card::after {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.03) 0%, transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .booking-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; position: relative; z-index: 1; }
    @media (max-width: 560px) { .booking-form { grid-template-columns: 1fr; } }
    .booking-form .full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label {
      font-family: var(--ff-head); font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.4);
    }
    .form-input, .form-select, .form-textarea {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 18px;
      font-family: var(--ff-body); font-size: 13px; color: var(--text);
      outline: none; width: 100%;
      transition: border-color .25s ease, box-shadow .25s ease;
      -webkit-appearance: none; appearance: none;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--muted); }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05), 0 0 16px rgba(255,255,255,0.04);
    }
    .form-select {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='rgba(255,255,255,0.3)' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 16px center; background-size: 10px;
      cursor: pointer; color: var(--muted);
    }
    .form-select option { background: #1a1a20; color: var(--text); }
    .form-textarea { resize: none; height: 120px; line-height: 1.6; }
    .booking-submit {
      grid-column: 1 / -1; width: 100%; padding: 16px; border-radius: 14px;
      font-family: var(--ff-head); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22);
      color: var(--text); cursor: pointer;
      transition: all .35s cubic-bezier(.175,.885,.32,1.275);
      position: relative; overflow: hidden;
    }
    .booking-submit::after {
      content: ''; position: absolute; top: 0; left: -130%;
      width: 60%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
      transform: skewX(-20deg);
    }
    .booking-submit:hover::after { animation: ctaGlint .6s ease-out forwards; }
    .booking-submit:hover {
      background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.38);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
    }
    .booking-success { display: none; text-align: center; padding: 48px 0; position: relative; z-index: 1; }
    .booking-success.show { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .success-icon {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(63,222,132,0.08); border: 1px solid rgba(63,222,132,0.2);
      display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
    }
    .success-icon svg { width: 22px; height: 22px; }
    .success-title { font-family: var(--ff-head); font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
    .success-msg { font-size: 12.5px; color: var(--muted); font-weight: 300; }

    /* ── DISCORD WIDGET SECTION ──────────────────────────────── */
    .discord-wrap {
      max-width: 860px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 28px; align-items: center;
    }
    @media (max-width: 680px) { .discord-wrap { grid-template-columns: 1fr; } }
    .discord-widget-card {
      background: var(--surface); border-radius: var(--r-card);
      border: 1px solid var(--border); overflow: hidden;
      position: relative;
      box-shadow: 0 30px 60px rgba(0,0,0,0.35);
    }
    .discord-widget-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent, rgba(88,101,242,0.5), transparent);
      z-index: 1;
    }
    .discord-widget-card iframe {
      display: block; width: 100%; height: 380px;
      border: none; border-radius: var(--r-card);
    }
    .discord-info { padding: 8px 0; }
    .discord-badge {
      display: inline-flex; align-items: center; gap: 7px;
      font-family: var(--ff-head); font-size: 9px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(88,101,242,0.9);
      background: rgba(88,101,242,0.1); border: 1px solid rgba(88,101,242,0.25);
      border-radius: 20px; padding: 5px 13px; margin-bottom: 20px;
    }
    .discord-badge svg { width: 13px; height: 13px; fill: currentColor; }
    .discord-info-title {
      font-family: var(--ff-head); font-size: clamp(22px, 3.5vw, 30px);
      font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 14px;
    }
    .discord-info-desc { font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.8; margin-bottom: 28px; }
    .discord-join-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px; border-radius: 12px;
      font-family: var(--ff-head); font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      background: rgba(88,101,242,0.15); border: 1px solid rgba(88,101,242,0.35);
      color: rgba(180,185,255,0.95); cursor: pointer;
      transition: all .3s cubic-bezier(.175,.885,.32,1.275);
      text-decoration: none;
    }
    .discord-join-btn:hover {
      background: rgba(88,101,242,0.28); border-color: rgba(88,101,242,0.6);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(88,101,242,0.2);
      color: #fff;
    }
    .discord-join-btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

    /* ── BOOKING MODAL ──────────────────────────────────────── */
    .book-modal {
      position: fixed; inset: 0; z-index: 25000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(4,4,6,0.88); backdrop-filter: blur(16px);
      opacity: 0; pointer-events: none; transition: opacity .35s ease;
    }
    .book-modal.open { opacity: 1; pointer-events: all; }
    .book-modal-inner {
      background: var(--surface); border-radius: 24px; padding: 36px;
      max-width: 520px; width: 92%; border: 1px solid var(--border);
      transform: scale(0.92) translateY(20px);
      transition: transform .4s cubic-bezier(.16,1,.3,1);
      box-shadow: 0 60px 120px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
      position: relative; overflow: hidden;
    }
    .book-modal.open .book-modal-inner { transform: scale(1) translateY(0); }
    .book-modal-inner::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
    }
    .book-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .book-modal-title { font-family: var(--ff-head); font-size: 14px; font-weight: 800; letter-spacing: -0.02em; }
    .book-modal-sub { font-size: 11px; color: var(--muted); font-weight: 300; margin-top: 3px; }
    .book-modal-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--muted); cursor: pointer; transition: all .2s;
    }
    .book-modal-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    .book-modal-form { display: flex; flex-direction: column; gap: 14px; }

    /* ── SAKURA BRANCHES ────────────────────────────────────── */
    .sakura-branch {
      position: fixed; top: 0; z-index: 2; pointer-events: none;
      width: clamp(180px, 18vw, 300px); opacity: 0.72;
      mix-blend-mode: screen;
    }
    .sakura-left  { left: 0; top: 0; transform: scaleX(-1); }
    .sakura-right { right: 0; top: 0; }
    @media (max-width: 900px) { .sakura-branch { opacity: 0.4; width: 140px; } }
    @media (max-width: 600px) { .sakura-branch { display: none; } }

    /* ── PAGE BORDER LINES ───────────────────────────────────── */
    .page-border {
      position: fixed; top: 0; bottom: 0; width: 1px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,255,255,0.07) 8%,
        rgba(255,255,255,0.07) 92%,
        transparent 100%
      );
      z-index: 1; pointer-events: none;
    }
    .page-border-left  { left:  max(0px, calc(50% - 510px)); }
    .page-border-right { right: max(0px, calc(50% - 510px)); }
    @media (max-width: 1020px) { .page-border { display: none; } }

    /* ── BACKGROUND LOGO WATERMARK ──────────────────────────── */
    .bg-logo-watermark {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: url('pictures/logo.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: clamp(320px, 45vw, 560px);
      mix-blend-mode: screen;
      opacity: 0.038;
      will-change: opacity;
    }

    /* ── CURSOR SPOTLIGHT ────────────────────────────────────── */
    .cursor-spotlight { display: none; }

    /* ── SCROLL PROGRESS BAR ─────────────────────────────────── */
    #scrollProgress {
      position: fixed; top: 0; left: 0; height: 2px; z-index: 10000;
      background: linear-gradient(to right, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
      width: 0%; transition: width .1s linear;
      pointer-events: none;
    }

    /* ── SECTION REVEAL — enhanced ───────────────────────────── */
    .reveal {
      opacity: 0; transform: translateY(32px) scale(0.97);
      transition: opacity .85s cubic-bezier(.16,1,.3,1), transform .85s cubic-bezier(.175,.885,.32,1.275);
    }
    .reveal.in { opacity: 1; transform: none; }

    /* ── CTA BUTTON — magnetic feel ──────────────────────────── */
    .cta-button { will-change: transform; }

    /* ── CARD tilt ────────────────────────────────────────────── */
    .card { will-change: transform; }

    /* ── STAT NUMBER COUNTER ─────────────────────────────────── */
    .stat-num { transition: color .3s; }
    .stat-box:hover .stat-num { color: rgba(255,255,255,0.9); }

    /* ── POP IMAGES — refined ────────────────────────────────── */
    .pop-img {
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 8px 28px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06);
    }

    /* ── HOVER LINK UNDERLINE in footer ──────────────────────── */
    .footer-col ul li a {
      position: relative;
    }
    .footer-col ul li a::after {
      content: ''; position: absolute; bottom: -1px; left: 0;
      width: 0; height: 1px;
      background: rgba(255,255,255,0.4);
      transition: width .25s ease;
    }
    .footer-col ul li a:hover::after { width: 100%; }
    .footer-col ul li a:hover { padding-left: 0; }

    /* ── SOCIAL BTN — scale pop ──────────────────────────────── */
    .social-btn { transition: color .3s, border-color .3s, transform .35s cubic-bezier(.175,.885,.32,1.275), box-shadow .3s; }

    /* ── SECTION HEADER stagger ──────────────────────────────── */
    .section-title { transition: opacity .6s, transform .6s; }
  </style>
</head>

    card.addEventListener('mouseenter', () => {
      isHovered = true;
      clearTimeout(leaveTimer);
    });

    card.addEventListener('mousemove', e => {
      clearTimeout(leaveTimer);
      isHovered = true;
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width  - 0.5;
      const y = (e.clientY - r.top)  / r.height - 0.5;
      card.style.transform = `translateY(-14px) scale(1.02) rotateY(${x * 8}deg) rotateX(${-y * 8}deg)`;
    });

    card.addEventListener('mouseleave', e => {
      // Only reset if the mouse truly left (not just brushed a child element's boundary)
      leaveTimer = setTimeout(() => {
        if (isHovered) {
          isHovered = false;
          card.style.transform = '';
        }
      }, 60);
    });

  // Animated stat counters
  function animateCounter(el) {
    const target = parseInt(el.textContent.replace(/\D/g, ''), 10);
    const suffix = el.textContent.replace(/[\d]/g, '');
    if (!target) return;
    let start = null;
    const duration = 1200;
    function step(ts) {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(ease * target) + suffix;
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  const counterObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        animateCounter(e.target);
        counterObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.6 });
  document.querySelectorAll('.stat-num').forEach(el => counterObserver.observe(el));

  // Mouse-tracking border glow on all glow-enabled cards
  document.querySelectorAll('.pricing-card, .about-bio, .stat-box, .process-step, .booking-card, .tcard').forEach(el => {

      const r = el.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width  * 100).toFixed(1) + '%';
      const y = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';
      el.style.setProperty('--mx', x);
      el.style.setProperty('--my', y);
    });
  });

  const revealObserver = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); revealObserver.unobserve(e.target); } });

  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

  const cardObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const cards = Array.from(e.target.querySelectorAll('.card:not(.in)'));
      cards.forEach((c, i) => setTimeout(() => c.classList.add('in'), i * 80));
      cardObserver.unobserve(e.target);

     LIGHTBOX — single image view with navigation
  ════════════════════════════════════════════════════════════ */
  const lightbox      = document.getElementById('lightbox');
  const lightboxLabel = document.getElementById('lightboxLabel');
  const lightboxClose = document.getElementById('lightboxClose');
  const lbMainImg     = document.getElementById('lightboxMainImg');
  const lbDots        = document.getElementById('lbDots');
  const lbPrev        = document.getElementById('lbPrev');
  const lbNext        = document.getElementById('lbNext');

  let lbImages  = [];
  let lbIndex   = 0;

  function renderLb() {
    // Fade out → swap → fade in
    lbMainImg.classList.add('fading');
    setTimeout(() => {
      lbMainImg.style.backgroundImage = `url('${lbImages[lbIndex]}')`;
      lbMainImg.classList.remove('fading');
    }, 180);

    // Dots
    lbDots.innerHTML = '';
    lbImages.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'lb-dot' + (i === lbIndex ? ' active' : '');
      d.setAttribute('aria-label', `Image ${i + 1}`);
      d.addEventListener('click', () => { lbIndex = i; renderLb(); });
      lbDots.appendChild(d);
    });

    lbPrev.disabled = lbIndex === 0;
    lbNext.disabled = lbIndex === lbImages.length - 1;
  }

  function openLightbox(label, imgs, startIndex) {
    lbImages = imgs;
    lbIndex  = startIndex || 0;
    lightboxLabel.textContent = label;
    // Show immediately without fade on first open
    lbMainImg.style.backgroundImage = `url('${lbImages[lbIndex]}')`;
    renderLb();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  lbPrev.addEventListener('click', () => { if (lbIndex > 0) { lbIndex--; renderLb(); } });
  lbNext.addEventListener('click', () => { if (lbIndex < lbImages.length - 1) { lbIndex++; renderLb(); } });

  /* Card + pop-image clicks */
  document.getElementById('serviceGrid').addEventListener('click', e => {

    const popImg = e.target.closest('.pop-img');
    const startIndex = popImg ? parseInt(popImg.dataset.index, 10) : 0;
    const imgs = JSON.parse(card.dataset.imgs);

    // stop pop-img click from also triggering card-level logic twice
    e.stopPropagation();
    openLightbox(card.dataset.label, imgs, startIndex);
  });

  lightboxClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (lightbox.classList.contains('open')) {
      if (e.key === 'ArrowLeft'  && lbIndex > 0)                  { lbIndex--; renderLb(); }
      if (e.key === 'ArrowRight' && lbIndex < lbImages.length - 1) { lbIndex++; renderLb(); }

      return false; // webhook not configured, use fallback
    }
    try {

        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: 'Auvality Bookings',

            timestamp: new Date().toISOString(),
            footer: { text: 'Auvality Booking System' }
          }]
        })
      });
      return res.ok;
    } catch { return false; }
  }

  async function submitBooking() {
    const name     = document.getElementById('bookName').value.trim();
    const contact  = document.getElementById('bookContact').value.trim();

    const budget   = document.getElementById('bookBudget').value;

    const timeline = document.getElementById('bookTimeline').value.trim();

    if (!name || !contact || !service) {
      document.querySelectorAll('#bookingForm .form-input, #bookingForm .form-select').forEach(el => {
        if (!el.value.trim()) {
          el.style.borderColor = 'rgba(255,80,80,0.5)';
          setTimeout(() => el.style.borderColor = '', 1800);
        }
      });
      return;
    }

    const submitBtn = document.querySelector('#bookingForm .booking-submit');
    setSubmitLoading(submitBtn, true);

    const payload = [
      ['👤 Name', name],
      ['📬 Contact', contact],
      ['🎨 Service', service],
      ['💰 Budget', budget || 'Not specified'],
      ['⏱️ Timeline', timeline || 'Not specified'],
      ['📝 Description', desc || 'Not specified'],
    ];

    const sent = await sendToDiscord(payload);

    if (!sent) {
      // Fallback: open mailto
      const body = payload.map(([k, v]) => `${k}: ${v}`).join('\n');
      fallbackEmail('New Booking Request — Auvality', body);
    }

    setSubmitLoading(submitBtn, false);
    document.getElementById('bookingFormWrap').style.display = 'none';
    document.getElementById('bookingSuccess').classList.add('show');
  }

  /* ════════════════════════════════════════════════════════════
     BOOKING MODAL
  ════════════════════════════════════════════════════════════ */
  const bookModal      = document.getElementById('bookModal');
  const bookModalClose = document.getElementById('bookModalClose');

  function openBookModal(plan) {
    document.getElementById('modalPlanLabel').textContent = plan + ' plan selected';
    // Pre-fill the plan in the main booking form service select if possible
    bookModal.dataset.plan = plan;
    bookModal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeBookModal() {
    bookModal.classList.remove('open');
    document.body.style.overflow = '';
  }
  async function submitModal() {
    const name    = document.getElementById('mBookName').value.trim();
    const contact = document.getElementById('mBookContact').value.trim();
    const notes   = document.getElementById('mBookNotes').value.trim();
    const plan    = bookModal.dataset.plan || '';

    if (!name || !contact) {
      [document.getElementById('mBookName'), document.getElementById('mBookContact')].forEach(el => {
        if (!el.value.trim()) {
          el.style.borderColor = 'rgba(255,80,80,0.5)';
          setTimeout(() => el.style.borderColor = '', 1800);
        }
      });
      return;
    }

    const submitBtn = bookModal.querySelector('.booking-submit');
    setSubmitLoading(submitBtn, true);

    const payload = [
      ['👤 Name', name],
      ['📬 Contact', contact],
      ['📦 Plan', plan],
      ['📝 Notes', notes || 'None'],
    ];

    const sent = await sendToDiscord(payload);

    if (!sent) {
      const body = payload.map(([k, v]) => `${k}: ${v}`).join('\n');
      fallbackEmail(`New Booking — ${plan} Plan — Auvality`, body);
    }

    setSubmitLoading(submitBtn, false);
    closeBookModal();
    document.getElementById('bookingFormWrap').style.display = 'none';
    document.getElementById('bookingSuccess').classList.add('show');
    document.getElementById('booking').scrollIntoView({ behavior: 'smooth' });
  }

  bookModalClose.addEventListener('click', closeBookModal);
  bookModal.addEventListener('click', e => { if (e.target === bookModal) closeBookModal(); });

  </script>
</body>
