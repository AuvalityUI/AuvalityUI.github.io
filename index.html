  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #050505;
      --surface:   #111111;
      --surface2:  #1a1a1a;
      --text:      #FFFFFF;
      --muted:     #a0a09e;
      --border:    rgba(255,255,255,0.13);
      --border-h:  rgba(255,255,255,0.26);
      --accent:    #ffffff;
      --accent-dim: rgba(255,255,255,0.75);
      --r-card:    22px;
      --ff-head:   'Inter', sans-serif;
      --ff-body:   'Inter', sans-serif;
      --ff-serif:  'Inter', sans-serif;
    }
    html { scroll-behavior: smooth; }
    @keyframes pageFadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    .container { animation: pageFadeIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) both; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 10px; }
    * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.18) var(--bg); }
    @keyframes ambientGradientDrift {
      0%   { transform: translate3d(-7%, -5%, 0) scale(1.08) rotate(-2deg); }
      38%  { transform: translate3d(5%, 1%, 0) scale(1.15) rotate(1.5deg); }
      72%  { transform: translate3d(-1%, 7%, 0) scale(1.11) rotate(-0.5deg); }
      100% { transform: translate3d(-7%, -5%, 0) scale(1.08) rotate(-2deg); }
    }
    @keyframes ambientGradientBreathe {
      0%, 100% { opacity: .78; }
      50%      { opacity: 1; }
    }
    html { background: #030303; }
    body {
      background: transparent;
      color: var(--text);
      font-family: var(--ff-body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      isolation: isolate;
      cursor: none;
    }
    .ambient-background {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background:
        linear-gradient(145deg, #020202 0%, #090909 38%, #060606 68%, #010101 100%);
    }
    .ambient-background::before {
      content: '';
      position: absolute;
      inset: -24%;
      background:
        radial-gradient(circle at 18% 28%, rgba(170,170,170,.28) 0%, rgba(96,96,96,.12) 24%, transparent 49%),
        radial-gradient(circle at 82% 20%, rgba(118,118,118,.20) 0%, rgba(70,70,70,.09) 27%, transparent 52%),
        radial-gradient(circle at 64% 84%, rgba(142,142,142,.16) 0%, rgba(78,78,78,.07) 30%, transparent 55%),
        linear-gradient(118deg, transparent 24%, rgba(255,255,255,.045) 47%, transparent 68%);
      filter: blur(34px);
      will-change: transform, opacity;
      animation:
        ambientGradientDrift 26s cubic-bezier(.45,.05,.2,1) infinite,
        ambientGradientBreathe 11s ease-in-out infinite;
    }
    .ambient-background::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 38%, transparent 0%, rgba(0,0,0,.08) 48%, rgba(0,0,0,.68) 100%),
        linear-gradient(112deg, rgba(255,255,255,.018), transparent 27%, rgba(255,255,255,.01) 55%, transparent 78%);
    }
    @media (max-width: 700px) {
      .ambient-background::before { inset: -35%; filter: blur(26px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .ambient-background::before {
        animation: none;
        transform: translate3d(-2%, 0, 0) scale(1.1);
        opacity: .9;
      }
    }
    a { text-decoration: none; color: inherit; cursor: none; }
    ul { list-style: none; }
    button { cursor: none; border: none; background: none; font-family: inherit; }
    #cursor-dot,
    #cursor-ring {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      will-change: transform;
      mix-blend-mode: difference;
    }
    #cursor-dot {
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      transition: transform .08s ease, width .22s ease, height .22s ease, opacity .22s ease;
    }
    #cursor-ring {
      width: 30px; height: 30px;
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 50%;
      transition: width .3s cubic-bezier(.175,.885,.32,1.275),
                  height .3s cubic-bezier(.175,.885,.32,1.275),
                  border-color .25s ease,
                  opacity .25s ease;
    }
    body.cursor-hovering #cursor-dot  { width: 10px; height: 10px; }
    body.cursor-hovering #cursor-ring { width: 48px; height: 48px; border-color: rgba(255,255,255,0.9); }
    body.cursor-clicking #cursor-dot  { transform: translate(-50%,-50%) scale(0.6); }
    body.cursor-clicking #cursor-ring { width: 22px; height: 22px; border-color: #fff; }
    .container { max-width: 1020px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 3; }
    .reveal {
      opacity: 0; transform: translateY(28px) scale(0.97);
      transition: opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.175,.885,.32,1.275);
    }
    .reveal.in { opacity: 1; transform: none; }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px 0; flex-wrap: wrap; gap: 16px;
      border-bottom: 1px solid var(--border);
      animation: fadeDown .9s cubic-bezier(.16,1,.3,1) both;
      position: relative;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: none; }
    }
    .profile-section { display: flex; align-items: center; gap: 14px; }
    .profile-img {
      width: 38px; height: 38px; border-radius: 50%;
      background: #2A2A2A center/cover; flex-shrink: 0;
      overflow: hidden; position: relative;
      box-shadow: 0 0 0 1.5px rgba(255,255,255,0.18), 0 0 14px rgba(255,255,255,0.06);
    }
    .profile-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .profile-info h1 { font-family: var(--ff-head); font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
    .profile-info p { font-size: 11.5px; color: var(--muted); font-weight: 300; }
    .hdivider { width: 1px; height: 22px; background: var(--border); }
    .status-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 11.5px; padding: 5px 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 20px;
      backdrop-filter: blur(6px);
    }
    .status-dot {
      width: 6px; height: 6px; background: #3fde84; border-radius: 50%;
      animation: pulse 2.5s ease infinite;
      box-shadow: 0 0 10px rgba(63,222,132,0.9), 0 0 20px rgba(63,222,132,0.4);
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 10px rgba(63,222,132,0.9), 0 0 20px rgba(63,222,132,0.4), 0 0 0 0 rgba(63,222,132,0.4); }
      60%      { box-shadow: 0 0 10px rgba(63,222,132,0.9), 0 0 20px rgba(63,222,132,0.4), 0 0 0 7px rgba(63,222,132,0); }
    }
    .social-links { display: flex; gap: 5px; }
    .social-btn {
      height: 34px; padding: 0 14px;
      background: var(--surface); border-radius: 20px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: var(--ff-head); font-weight: 700; font-size: 10px; letter-spacing: 0.06em;
      border: 1px solid var(--border); color: var(--muted);
      position: relative; overflow: hidden;
      transition: color .3s cubic-bezier(.175,.885,.32,1.275),
                  border-color .3s ease, transform .3s cubic-bezier(.175,.885,.32,1.275),
                  box-shadow .3s ease;
    }
    .social-btn::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: rgba(255,255,255,0.05); opacity: 0; transition: opacity .3s ease;
    }
    .social-btn::after {
      content: ''; position: absolute; top: 0; left: -120%;
      width: 60%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
      transform: skewX(-20deg);
    }
    .social-btn:hover::after { animation: btnGlint .5s ease-out forwards; }
    @keyframes btnGlint { 0% { left:-120%; } 100% { left:180%; } }
    .social-btn:hover {
      transform: translateY(-3px); color: var(--text);
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
    }
    .social-btn:hover::before { opacity: 1; }
    .social-btn svg, .social-btn span { position: relative; z-index: 1; }
    .social-btn svg { width: 13px; height: 13px; flex-shrink: 0; transition: transform .3s ease; fill: currentColor; }
    .social-btn:hover svg { transform: scale(1.15); }
    .hero {
      padding: 80px 0 96px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; position: relative;
    }
    .hero > * { position: relative; z-index: 1; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes heroFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 10%; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.02) 40%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: ambientPulse 5s ease-in-out infinite;
    }
    @keyframes ambientPulse {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scale(1.08); }
    }
        .hero-title {
      font-family: var(--ff-serif);
      font-size: clamp(60px, 10vw, 90px);
      font-weight: 700; letter-spacing: -0.03em; line-height: 0.95;
      margin-bottom: 28px;
      color: var(--text);
      animation: fadeUp 1s .2s cubic-bezier(.16,1,.3,1) both;
      display: none;
    }
    .hero-subtitle {
      font-size: 15px; font-weight: 400; color: var(--muted); max-width: 400px;
      margin-bottom: 8px;
      animation: fadeUp .9s .35s cubic-bezier(.16,1,.3,1) both;
      letter-spacing: 0.02em;
    }
    .cta-button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--text);
      padding: 14px 38px; border-radius: 40px;
      font-family: var(--ff-head); font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: all .4s cubic-bezier(.175,.885,.32,1.275);
      box-shadow: 0 0 0 0 rgba(255,255,255,0), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: fadeUp .9s .55s cubic-bezier(.16,1,.3,1) both;
      position: relative; overflow: hidden; display: inline-block;
      backdrop-filter: blur(8px);
    }
    .cta-button::after {
      content: ''; position: absolute; top: 0; left: -130%;
      width: 60%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent);
      transform: skewX(-20deg);
    }
    .cta-button:hover::after { animation: ctaGlint .6s ease-out forwards; }
    @keyframes ctaGlint { 0% { left:-130%; } 100% { left:180%; } }
    .cta-button:hover {
      transform: translateY(-5px) scale(1.03);
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 30px rgba(255,255,255,0.1), 0 0 0 1px rgba(255,255,255,0.2),
                  0 16px 40px rgba(0,0,0,0.4);
    }
    .section-divider {
      width: 100%; height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.08), rgba(255,255,255,0.06), rgba(255,255,255,0.08), transparent);
    }
    .section { padding: 72px 0; }
    .section-header { text-align: center; margin-bottom: 48px; }
    .section-pill { display: none; }
    .section-title {
      font-family: var(--ff-head); font-size: clamp(26px, 4vw, 38px);
      font-weight: 700; letter-spacing: -0.03em; line-height: 1.08; margin-bottom: 12px;
    }
    .section-desc { font-size: 13.5px; color: var(--muted); font-weight: 300; line-height: 1.75; }
    .grid-container {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; max-width: 860px; margin: 0 auto;
    }
    @media (max-width: 720px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .grid-container { grid-template-columns: 1fr; } }
    .card {
      background: var(--surface); border-radius: var(--r-card);
      padding: 36px 18px 24px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      transition: transform .45s cubic-bezier(.175,.885,.32,1.275),
                  box-shadow .45s ease, border-color .3s ease;
      cursor: none; position: relative; overflow: hidden;
      opacity: 0; transform: translateY(36px) scale(0.88);
    }
    .card::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit; z-index: 0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      transition: box-shadow .4s ease; pointer-events: none;
    }
    .border-glow {
      position: absolute; inset: 0; border-radius: inherit; padding: 1.5px;
      background: radial-gradient(
        160px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
        rgba(255,255,255,0.85)  0%, rgba(255,255,255,0.35) 35%,
        rgba(255,255,255,0.06) 60%, transparent 75%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      opacity: 0;
      animation: borderGlowIdle 2.8s ease-in-out infinite alternate;
      pointer-events: none; z-index: 20;
    }
    @keyframes borderGlowIdle {
      0%   { opacity: 0.06; }
      100% { opacity: 0.28; }
    }
    .card:hover .border-glow { opacity: 1 !important; animation: none; }
    .card-border-glow {
      position: absolute; inset: 0; border-radius: inherit; padding: 1.5px;
      background: radial-gradient(
        160px circle at var(--mx, 50%) var(--my, 50%),
        rgba(255,255,255,0.7)  0%, rgba(255,255,255,0.25) 35%,
        rgba(255,255,255,0.04) 60%, transparent 75%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      animation: borderGlowIdle 3.2s ease-in-out infinite alternate;
      pointer-events: none; z-index: 20;
    }
    .pricing-card:hover .card-border-glow,
    .about-bio:hover .card-border-glow,
    .stat-box:hover .card-border-glow,
    .process-step:hover .card-border-glow,
    .booking-card:hover .card-border-glow,
    .tcard:hover .card-border-glow {
      opacity: 1 !important; animation: none;
    }
    .card-shimmer {
      position: absolute; inset: 0; border-radius: inherit; overflow: hidden; pointer-events: none; z-index: 1;
    }
    .card-shimmer::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(115deg, rgba(255,255,255,0) 35%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0) 65%);
      transform: translateX(-120%) skewX(-10deg);
    }
    .card:hover .card-shimmer::before { animation: sweep .6s ease-out; }
    @keyframes sweep {
      from { transform: translateX(-120%) skewX(-10deg); }
      to   { transform: translateX(220%)  skewX(-10deg); }
    }
    .card::after {
      content: ''; position: absolute; bottom: -40px; left: 50%;
      transform: translateX(-50%);
      width: 70%; height: 80px;
      background: radial-gradient(ellipse, rgba(255,255,255,0.07) 0%, transparent 70%);
      border-radius: 50%; opacity: 0;
      transition: opacity .4s ease, bottom .4s ease;
      pointer-events: none; z-index: 0;
    }
    .card.in {
      opacity: 1; transform: none;
      transition: opacity .65s cubic-bezier(.16,1,.3,1), transform .75s cubic-bezier(.175,.885,.32,1.275),
                  box-shadow .45s ease, border-color .3s ease;
    }
    .card.in.lifted {
      transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .45s cubic-bezier(.175,.885,.32,1.275),
                  box-shadow .45s ease, border-color .3s ease;
    }
    .card:hover {
      transform: translateY(-14px) scale(1.02);
      border-color: rgba(255,255,255,0.32);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.24), 0 0 30px rgba(255,255,255,0.14),
        0 0 80px rgba(255,255,255,0.06), 0 32px 64px rgba(0,0,0,0.6),
        0 8px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .card:hover::before { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18); }
    .card:hover::after  { opacity: 1; bottom: -20px; }
    .card-title {
      font-family: var(--ff-head); font-size: 11px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      margin-top: 20px; color: rgba(255,255,255,0.6);
      transition: color .3s, letter-spacing .3s;
      position: relative; z-index: 5;
    }
    .card:hover .card-title { color: var(--text); letter-spacing: 0.09em; }
    .card-desc {
      font-size: 10.5px; color: var(--muted); font-weight: 300; text-align: center;
      margin-top: 6px; line-height: 1.6; max-width: 130px;
      position: relative; z-index: 5;
      transition: color .3s;
    }
    .card:hover .card-desc { color: rgba(255,255,255,0.5); }
    .folder { position: relative; width: 132px; height: 92px; perspective: 900px; z-index: 5; }
    .folder::before {
      content: ''; position: absolute; top: -12px; left: 0;
      width: 46px; height: 14px;
      background: #ffffff;
      border-radius: 7px 7px 0 0;
      border: 1px solid rgba(255,255,255,0.6);
      border-bottom: none;
      box-shadow: 0 -2px 8px rgba(255,255,255,0.15);
    }
    .folder-back {
      position: absolute; inset: 0;
      background: #f0f0f0;
      border-radius: 0 8px 8px 8px;
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .folder-inside {
      position: absolute; bottom: 8px; left: 8px;
      width: calc(100% - 16px); height: 70%;
      background: #e8e8e8;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.5);
    }
    .folder-inside::after { display: none; }
    .folder-front {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 72%;
      background: #ffffff;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.9);
      border-top: 1px solid rgba(255,255,255,1);
      z-index: 10; overflow: hidden;
      transform-origin: bottom center;
      transition: transform .45s cubic-bezier(.175,.885,.32,1.275);
      box-shadow: 0 4px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .folder-front::before { display: none; }
    .card:hover .folder-front { transform: rotateX(-26deg); }
    .folder-front::after {
      content: ''; position: absolute; top: 0; left: -160%;
      width: 50%; height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
    }
    .card:hover .folder-front::after { animation: glint .55s ease-out forwards; }
    @keyframes glint { 0% { left:-160%; } 100% { left:210%; } }
    .popout-images {
      position: absolute; bottom: 22px; left: 50%;
      transform: translateX(-50%); width: 100%; height: 100%;
      z-index: 5; pointer-events: none; 
    }
    .pop-img {
      position: absolute; width: 58px; height: 40px;
      border-radius: 5px; border: 1.5px solid rgba(255,255,255,0.12);
      box-shadow: 0 4px 20px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
      opacity: 0; transition: all .45s cubic-bezier(.175,.885,.32,1.275);
      cursor: default; overflow: hidden;
      /* Own composited layer for crisp image rendering */
      will-change: transform;
      isolation: isolate;
    }
    .pop-img img {
      width: 100%; height: 100%; display: block;
      object-fit: cover; object-position: center;
      border-radius: 4px;
      image-rendering: auto;
      transform: translateZ(0);
    }
    .pop-img:nth-child(1) { left: 6px;  bottom: -8px; transform: rotate(0) scale(0.82); transition-delay: .07s; }
    .pop-img:nth-child(2) { right: 6px; bottom: -8px; transform: rotate(0) scale(0.82); transition-delay: .035s; }
    .pop-img:nth-child(3) { left: 50%;  bottom: -8px; transform: translateX(-50%) scale(0.82); width: 68px; height: 46px; z-index: 2; transition-delay: 0s; }
    .card:hover .pop-img { opacity: 1; }
    .card:hover .pop-img:nth-child(1) { bottom: 10px; transform: rotate(-14deg) scale(1) translateX(-4px); transition-delay: 0s; }
    .card:hover .pop-img:nth-child(2) { bottom: 10px; transform: rotate(14deg)  scale(1) translateX( 4px); transition-delay: .035s; }

  <script>
  const SOCIAL_ICONS = {
    x: `<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg><span>X</span>`,
    discord: `<svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg><span>DC</span>`,
  };
  function makeSocialBtn(url, key, label) {
    const a = document.createElement('a');
    a.href = url; a.className = 'social-btn'; a.setAttribute('aria-label', label);
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.innerHTML = SOCIAL_ICONS[key] || ''; return a;
  }

  const galleryViewer = (() => {
    const lightbox = document.getElementById('lightbox');
    const inner = document.getElementById('lightboxInner');
    const mainImg = document.getElementById('lightboxMainImg');
    const label = document.getElementById('lightboxLabel');
    const count = document.getElementById('lightboxCount');
    const dots = document.getElementById('lbDots');
    const prev = document.getElementById('lbPrev');
    const next = document.getElementById('lbNext');
    const close = document.getElementById('lightboxClose');
    let images = [];
    let index = 0;
    let title = 'Work';
    let lastFocused = null;

    function render(immediate = false) {
      if (!images.length) return;
      const update = () => {
        mainImg.src = images[index];
        mainImg.alt = `${title} — image ${index + 1} of ${images.length}`;
        label.textContent = title;
        count.textContent = `${index + 1} / ${images.length}`;
        dots.querySelectorAll('.lb-dot').forEach((dot, dotIndex) => {
          dot.classList.toggle('active', dotIndex === index);
          dot.setAttribute('aria-current', dotIndex === index ? 'true' : 'false');
        });
        const activeDot = dots.children[index];
        if (activeDot) activeDot.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      };
      if (immediate || !mainImg.src) {
        update();
        return;
      }
      mainImg.classList.add('fading');
      window.setTimeout(() => {
        update();
        mainImg.classList.remove('fading');
      }, 150);
    }

    function show(newImages, newTitle = 'Work', startIndex = 0) {
      const cleaned = [...new Set((newImages || []).filter(Boolean))];
      if (!cleaned.length) return;
      images = cleaned;
      title = newTitle;
      index = Math.max(0, Math.min(startIndex, images.length - 1));
      lastFocused = document.activeElement;
      dots.innerHTML = '';
      images.forEach((_, dotIndex) => {
        const dot = document.createElement('button');
        dot.type = 'button';
        dot.className = 'lb-dot';
        dot.setAttribute('aria-label', `View image ${dotIndex + 1}`);
        dot.addEventListener('click', () => { index = dotIndex; render(); });
        dots.appendChild(dot);
      });
      render(true);
      lightbox.classList.add('open');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      close.focus({ preventScroll: true });
    }

    function hide() {
      lightbox.classList.remove('open');
      lightbox.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      mainImg.removeAttribute('src');
      if (lastFocused && typeof lastFocused.focus === 'function') lastFocused.focus({ preventScroll: true });
    }

    function step(direction) {
      if (images.length < 2) return;
      index = (index + direction + images.length) % images.length;
      render();
    }

    prev.addEventListener('click', () => step(-1));
    next.addEventListener('click', () => step(1));
    close.addEventListener('click', hide);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) hide(); });
    inner.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') hide();
      if (e.key === 'ArrowLeft') step(-1);
      if (e.key === 'ArrowRight') step(1);
    });

    return { show, hide };
  })();

  function makeFolderCard({ label, desc, images, extraClass = '' }) {
    const cleanImages = [...new Set((images || []).filter(Boolean))];
    if (!cleanImages.length) return null;
    const previews = cleanImages.slice(0, 3);
    while (previews.length < 3) previews.push(cleanImages[previews.length % cleanImages.length]);
    const el = document.createElement('div');
    el.className = `card ${extraClass}`.trim();
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', `Open ${label} gallery`);
    el.innerHTML = `
      <div class="border-glow"></div>
      <div class="card-click-hint">Click to see</div>
      <div class="folder">
        <div class="folder-back"></div>
        <div class="folder-inside"></div>
        <div class="popout-images">
          <div class="pop-img"><img src="${previews[0]}" alt=""></div>
          <div class="pop-img"><img src="${previews[1]}" alt=""></div>
          <div class="pop-img"><img src="${previews[2]}" alt=""></div>
        </div>
        <div class="folder-front"></div>
      </div>
      <div class="card-shimmer"></div>
      <div class="card-title">${label}</div>
      <div class="card-desc">${desc}</div>
    `;
    const open = () => galleryViewer.show(cleanImages, label);
    el.addEventListener('click', open);
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        open();
      }
    });
    return el;
  }

  function boot() {
    const D = SITE_DATA;
    document.title = `${D.header.name} — Game UI/UX Designer`;
    document.getElementById('heroTitle').textContent    = D.hero.title;
    document.getElementById('heroSubtitle').textContent = D.hero.subtitle;
    document.getElementById('heroCtaLeft').textContent  = D.hero.ctaLeft;
    document.getElementById('heroCtaRight').textContent = D.hero.ctaRight;
    const hf = document.getElementById('heroFooter');
    hf.textContent = D.hero.footerNote;
    if (!D.hero.footerNote) hf.style.display = 'none';
    document.getElementById('servicesPill').textContent  = D.services.pill;
    document.getElementById('servicesTitle').textContent = D.services.title;
    document.getElementById('servicesDesc').textContent  = D.services.desc;
    const grid = document.getElementById('serviceGrid');
    D.services.cards.forEach(card => {
      const el = makeFolderCard({
        label: card.label,
        desc: card.desc,
        images: card.images
      });
      if (el) grid.appendChild(el);
    });
    // Use every portfolio image shown by the site's work folders, plus any
    // additional project images, so both hero marquees represent the full body of work.
    const serviceWorkImgs = (D.services?.cards || []).flatMap(card => card.images || []);
    const projectWorkImgs = D.projects?.workImages || [];
    const workImgs = [...new Set([...serviceWorkImgs, ...projectWorkImgs].filter(Boolean))];
    const heroScene = document.getElementById('heroMarqueeScene');
    const heroTracks = [
      document.getElementById('heroWorkTrackTop'),
      document.getElementById('heroWorkTrackBottom')
    ];
    if (workImgs.length > 0 && heroTracks.every(Boolean)) {
      heroTracks.forEach((track, trackIndex) => {
        const ordered = trackIndex === 0 ? workImgs : [...workImgs].reverse();
        const looped = [...ordered, ...ordered, ...ordered, ...ordered];
        looped.forEach(src => {
          const item = document.createElement('div');
          item.className = 'hero-work-item';
          const img = document.createElement('img');
          img.src = src;
          img.alt = '';
          img.loading = 'eager';
          img.decoding = 'async';
          item.appendChild(img);
          track.appendChild(item);
        });
      });
    } else if (heroScene) {
      heroScene.style.display = 'none';
    }
    if (workImgs.length) {
      const allWorkCard = makeFolderCard({
        label: 'All Work',
        desc: `${workImgs.length} project image${workImgs.length === 1 ? '' : 's'}`,
        images: workImgs,
        extraClass: 'all-work-card'
      });
      if (allWorkCard) grid.appendChild(allWorkCard);
    }
    document.getElementById('aboutPill').textContent     = D.about.pill;
    document.getElementById('aboutTitle').textContent    = D.about.title;
    document.getElementById('aboutDesc').textContent     = D.about.desc;
    document.getElementById('aboutBioLabel').textContent = D.about.bioLabel;
    const bioContainer = document.getElementById('aboutBioText');
    D.about.bio.forEach(para => {
      const p = document.createElement('p');
      p.className = 'about-bio-text'; p.innerHTML = para;
      bioContainer.appendChild(p); bioContainer.appendChild(document.createElement('br'));
    });
    const statsEl = document.getElementById('aboutStats');
    D.about.stats.forEach(s => {
      const box = document.createElement('div');
      box.className = 'stat-box';
      box.innerHTML = `<div class="card-border-glow"></div><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div>`;
      statsEl.appendChild(box);
    });
    const processIcons = [
      `<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>`,
      `<svg viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>`,
      `<svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`,
      `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`,
    ];
    const processEl = document.getElementById('processSteps');
    D.about.process.forEach((step, i) => {
      const div = document.createElement('div');
      div.className = 'process-step';
      div.innerHTML = `<div class="card-border-glow"></div><div class="process-num">${step.step}</div><div class="process-icon">${processIcons[i] || ''}</div><div class="process-title">${step.title}</div><div class="process-desc">${step.desc}</div>`;
      processEl.appendChild(div);
    });
    document.getElementById('testimonialsPill').textContent  = D.testimonials.pill;
    document.getElementById('testimonialsTitle').textContent = D.testimonials.title;
    document.getElementById('testimonialsDesc').textContent  = D.testimonials.desc;
    function renderStars(rating) {
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i) {
          html += '<span class="star-full">★</span>';
        } else if (rating >= i - 0.5) {
          html += '<span class="star-half">★</span>';
        } else {
          html += '<span class="star-empty">★</span>';
        }
      }
      return html;
    }
    function makeReviewCard(r) {
      const starsHTML = renderStars(r.stars !== undefined ? r.stars : 5);
      const avatarHTML = r.avatar
        ? `<img src="${r.avatar}" alt="${r.name}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.style.display='none';this.parentElement.textContent='${r.name.charAt(0).toUpperCase()}'">`
        : r.name.charAt(0).toUpperCase();
      const div = document.createElement('div'); div.className = 'tcard';
      div.innerHTML = `
        <div class="card-border-glow"></div>
        <div class="tcard-stars">${starsHTML}</div>
        <div class="tcard-body">${r.body.replace(/\n/g, '<br>')}</div>
        <div class="tcard-author">
          <div class="tcard-avatar">${avatarHTML}</div>
          <div>
            <div class="tcard-name">${r.name}</div>
            <div class="tcard-role">${r.role}</div>
          </div>
        </div>
      `;
      return div;
    }
    const track = document.getElementById('testimonialsTrack');
    [...D.testimonials.reviews, ...D.testimonials.reviews].forEach(r => track.appendChild(makeReviewCard(r)));
    document.getElementById('pricingPill').textContent  = D.pricing.pill;
    document.getElementById('pricingTitle').textContent = D.pricing.title;
    document.getElementById('pricingDesc').textContent  = D.pricing.desc;

  const progressBar = document.getElementById('scrollProgress');
  window.addEventListener('scroll', () => {
    const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
    progressBar.style.width = Math.min(pct, 100) + '%';
  }, { passive: true });
  document.querySelectorAll('.card').forEach(card => {
    let leaveTimer = null;
    let isHovered = false;

    card.addEventListener('mouseenter', () => {
      isHovered = true;
      clearTimeout(leaveTimer);
    });
    card.addEventListener('mousemove', e => {
      clearTimeout(leaveTimer);
      isHovered = true;
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width  - 0.5;
      const y = (e.clientY - r.top)  / r.height - 0.5;
      card.style.transform = `translateY(-14px) scale(1.02) rotateY(${x * 8}deg) rotateX(${-y * 8}deg)`;
    });
    card.addEventListener('mouseleave', e => {
      leaveTimer = setTimeout(() => {
        if (isHovered) {
          isHovered = false;
          card.style.transform = '';
        }
      }, 60);
    });
  });
  document.querySelectorAll('.cta-button').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const r = btn.getBoundingClientRect();
      const x = (e.clientX - r.left - r.width  / 2) * 0.25;
      const y = (e.clientY - r.top  - r.height / 2) * 0.25;
      btn.style.transform = `translateY(-5px) scale(1.03) translate(${x}px, ${y}px)`;
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.transform = '';
    });
  });
  function animateCounter(el) {
    const target = parseInt(el.textContent.replace(/\D/g, ''), 10);
    const suffix = el.textContent.replace(/[\d]/g, '');
    if (!target) return;
    let start = null;
    const duration = 1200;
    function step(ts) {
      if (!start) start = ts;
      const progress = Math.min((ts - start) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(ease * target) + suffix;
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  const counterObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        animateCounter(e.target);
        counterObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.6 });
  document.querySelectorAll('.stat-num').forEach(el => counterObserver.observe(el));
  document.querySelectorAll('.pricing-card, .about-bio, .stat-box, .process-step, .booking-card, .tcard').forEach(el => {
    el.addEventListener('mousemove', e => {
      const r = el.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width  * 100).toFixed(1) + '%';
      const y = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';
      el.style.setProperty('--mx', x);
      el.style.setProperty('--my', y);
    });
  });
  const revealObserver = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); revealObserver.unobserve(e.target); } });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
  const cardObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const cards = Array.from(e.target.querySelectorAll('.card:not(.in)'));
      cards.forEach((c, i) => setTimeout(() => c.classList.add('in'), i * 80));
      cardObserver.unobserve(e.target);
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.grid-container').forEach(g => cardObserver.observe(g));
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('mouseenter', () => card.classList.add('lifted'));
    card.addEventListener('mouseleave', () => card.classList.remove('lifted'));
  });
  const BOOKING_CONFIG = {
    discordWebhook: 'https://discord.com/api/webhooks/1496557405528654095/XGkg9MBW3ZlNsOe4_MFLojuFt-aeRZUb4MVDeLvwMd8sBvpHqoQkJMTh-qo5x76wRBM3',
    fallbackEmail: 'auvality@gmail.com',
  };
  function setSubmitLoading(btn, loading) {
    btn.disabled = loading;
    btn.textContent = loading ? 'Sending…' : 'Send Request →';
    btn.style.opacity = loading ? '0.6' : '';
  }
  async function sendToDiscord(payload) {
    if (!BOOKING_CONFIG.discordWebhook) {
      return false;
    }
    const fieldMap = Object.fromEntries(payload.map(([k, v]) => [k.trim(), v]));
    try {
      const res = await fetch(BOOKING_CONFIG.discordWebhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: 'Auvality Bookings',
          avatar_url: 'https://cdn.discordapp.com/embed/avatars/0.png',
          embeds: [{
            title: '  New Service Booking Request',
            description: `> **${fieldMap['Name'] || '—'}** is requesting **${fieldMap['Service'] || '—'}**`,
            color: 0xffffff,
            fields: [
              { name: '  Name',    value: fieldMap['Name']    || '—', inline: true },
              { name: '  Contact', value: fieldMap['Contact'] || '—', inline: true },
              { name: '  Service', value: fieldMap['Service'] || '—', inline: true },
              { name: '  Budget',  value: fieldMap['Budget']  || '—', inline: true },
              { name: '  Timeline',value: fieldMap['Timeline']|| '—', inline: true },
              { name: '\u200b',      value: '\u200b',                   inline: true },
              { name: '  Description', value: fieldMap['Description'] || '—', inline: false },
            ],
            timestamp: new Date().toISOString(),
            footer: { text: 'Auvality Booking System  •  auvality.com' }
          }]
        })
      });
      return res.ok;
    } catch { return false; }
  }
  function fallbackEmail(subject, body) {
    const mailto = `mailto:${BOOKING_CONFIG.fallbackEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = mailto;
  }
  async function submitBooking() {
    const name     = document.getElementById('bookName').value.trim();
    const contact  = document.getElementById('bookContact').value.trim();
    const service  = document.getElementById('bookService').value;
    const budget   = document.getElementById('bookBudget').value;
    const desc     = document.getElementById('bookDesc').value.trim();
    const timeline = document.getElementById('bookTimeline').value.trim();
    if (!name || !contact || !service) {
      document.querySelectorAll('#bookingForm .form-input, #bookingForm .form-select').forEach(el => {
        if (!el.value.trim()) {
          el.style.borderColor = 'rgba(255,80,80,0.5)';
          setTimeout(() => el.style.borderColor = '', 1800);
        }
      });
      return;
    }
    const submitBtn = document.querySelector('#bookingForm .booking-submit');
    setSubmitLoading(submitBtn, true);
    const payload = [
      ['Name',        name],
      ['Contact',     contact],
      ['Service',     service],
      ['Budget',      budget || 'Not specified'],
      ['Timeline',    timeline || 'Not specified'],
      ['Description', desc || 'Not specified'],
    ];
    const sent = await sendToDiscord(payload);
    if (!sent) {
      const body = payload.map(([k, v]) => `${k}: ${v}`).join('\n');
      fallbackEmail('New Booking Request — Auvality', body);
    }
    setSubmitLoading(submitBtn, false);
    document.getElementById('bookingFormWrap').style.display = 'none';
    document.getElementById('bookingSuccess').classList.add('show');
  }
  (function() {
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let mx = -100, my = -100;
    let rx = -100, ry = -100;
    let raf;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      dot.style.left  = mx + 'px';
      dot.style.top   = my + 'px';
    }, { passive: true });
    function loop() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      raf = requestAnimationFrame(loop);
    }
    loop();
    const hoverTargets = 'a, button, [role="button"], .card, .social-btn, .cta-button, .pricing-cta, input, textarea, select';
    document.addEventListener('mouseover', e => {
      if (e.target.closest(hoverTargets)) document.body.classList.add('cursor-hovering');
    });
    document.addEventListener('mouseout', e => {
      if (e.target.closest(hoverTargets)) document.body.classList.remove('cursor-hovering');
    });
    document.addEventListener('mousedown', () => document.body.classList.add('cursor-clicking'));
    document.addEventListener('mouseup',   () => document.body.classList.remove('cursor-clicking'));
    document.addEventListener('mouseleave', () => { dot.style.opacity = '0'; ring.style.opacity = '0'; });
    document.addEventListener('mouseenter', () => { dot.style.opacity = ''; ring.style.opacity = ''; });
  })();

  </script>
  <script>
  /* Integrated entrance and navigation */
  (() => {
    const entrance = document.getElementById('entrance');
    const enterButton = document.getElementById('enterButton');
    const navLinksWrap = document.getElementById('siteNavLinks');
    const menuToggle = document.getElementById('siteMenuToggle');
    const navLinks = [...document.querySelectorAll('.site-nav-link[data-section]')];

    const closeMenu = () => {
      if (!navLinksWrap || !menuToggle) return;
      navLinksWrap.classList.remove('open');
      menuToggle.classList.remove('open');
      menuToggle.setAttribute('aria-expanded', 'false');
    };

    const enterSite = () => {
      if (!entrance || entrance.classList.contains('hide')) return;
      entrance.classList.add('hide');
      document.body.classList.remove('entrance-active');
      window.setTimeout(() => entrance.setAttribute('aria-hidden', 'true'), 960);
    };

    if (enterButton) enterButton.addEventListener('click', enterSite);

    const magneticButtons = [...document.querySelectorAll('.site-navbar .magnetic-nav')];
    const magneticPointer = window.matchMedia('(hover: hover) and (pointer: fine)');
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

    if (magneticPointer.matches && !reducedMotion.matches) {
      magneticButtons.forEach(button => {
        const resetMagnet = () => {
          button.style.setProperty('--magnetic-x', '0px');
          button.style.setProperty('--magnetic-y', '0px');
        };

        button.addEventListener('pointermove', event => {
          const rect = button.getBoundingClientRect();
          const distanceX = event.clientX - (rect.left + rect.width / 2);
          const distanceY = event.clientY - (rect.top + rect.height / 2);
          const strength = button.classList.contains('site-nav-cta') ? 0.24 : 0.32;
          const maxPull = button.classList.contains('site-nav-cta') ? 9 : 7;
          const pullX = Math.max(-maxPull, Math.min(maxPull, distanceX * strength));
          const pullY = Math.max(-maxPull, Math.min(maxPull, distanceY * strength));

          button.style.setProperty('--magnetic-x', `${pullX.toFixed(2)}px`);
          button.style.setProperty('--magnetic-y', `${pullY.toFixed(2)}px`);
        });

        button.addEventListener('pointerleave', resetMagnet);
        button.addEventListener('blur', resetMagnet);
      });
    }

    if (menuToggle && navLinksWrap) {
      menuToggle.addEventListener('click', () => {
        const isOpen = navLinksWrap.classList.toggle('open');
        menuToggle.classList.toggle('open', isOpen);
        menuToggle.setAttribute('aria-expanded', String(isOpen));
      });

      navLinksWrap.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));
      document.addEventListener('click', event => {
        if (!event.target.closest('.site-navbar')) closeMenu();
      });
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') closeMenu();
      });
    }

    const sectionPairs = navLinks
      .map(link => ({ link, section: document.getElementById(link.dataset.section) }))
      .filter(item => item.section);

    let activeFrame = 0;
    const updateActiveLink = () => {
      activeFrame = 0;
      const marker = window.scrollY + Math.min(window.innerHeight * .34, 260);
      const orderedSections = [...sectionPairs].sort((a, b) => a.section.offsetTop - b.section.offsetTop);
      let current = orderedSections[0]?.section.id || 'projects';
      orderedSections.forEach(({ section }) => {
        if (section.offsetTop <= marker) current = section.id;
      });
      navLinks.forEach(link => {
        const isActive = link.dataset.section === current;
        link.classList.toggle('active', isActive);
        if (isActive) link.setAttribute('aria-current', 'page');
        else link.removeAttribute('aria-current');
      });
    };

    const queueActiveUpdate = () => {
      if (!activeFrame) activeFrame = requestAnimationFrame(updateActiveLink);
    };

    updateActiveLink();
    window.addEventListener('scroll', queueActiveUpdate, { passive: true });
    window.addEventListener('resize', queueActiveUpdate, { passive: true });
  })();

  </script>
